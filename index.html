<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>典錡房產小幫手｜房產全能計算機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F2340;
    --navy-2:#1B3A63;
    --gold:#B68A35;
    --gold-2:#D9B36C;
    --cream:#FAF6EE;
    --paper:#FFFFFF;
    --ink:#20242C;
    --muted:#6C7280;
    --line:#E7E0D0;
    --danger:#AE4A31;
    --success:#2E6B52;
    --radius:14px;
    --shadow: 0 10px 30px -14px rgba(15,35,64,.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:84px;
  }
  h1,h2,h3,.display{font-family:'Noto Serif TC', serif;}

  /* ---------- Header ---------- */
  .hero{
    background:linear-gradient(150deg, var(--navy) 0%, var(--navy-2) 62%, #2A4C78 100%);
    color:#fff;
    padding:28px 20px 34px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute; right:-60px; top:-60px;
    width:280px; height:280px; border-radius:50%;
    background:radial-gradient(circle, rgba(217,179,108,.28), transparent 70%);
  }
  .hero-inner{
    max-width:980px; margin:0 auto;
    display:flex; align-items:center; gap:22px;
    position:relative; z-index:1;
    flex-wrap:wrap;
  }
  .avatar-frame{
    width:104px; height:104px; border-radius:50%;
    padding:3px;
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
    flex:none;
  }
  .avatar-frame img{
    width:100%; height:100%; border-radius:50%;
    object-fit:cover; object-position: top center;
    display:block; background:#0c1c33;
    border:3px solid var(--navy);
  }
  .hero-text{flex:1; min-width:220px;}
  .hero-eyebrow{
    font-size:12px; letter-spacing:.16em; color:var(--gold-2);
    font-weight:600; text-transform:uppercase; margin-bottom:6px;
  }
  .hero-title{
    font-size:26px; font-weight:700; margin:0 0 4px; line-height:1.3;
  }
  .hero-sub{
    font-size:13.5px; color:#C9D4E3; margin:0;
  }
  .hero-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:4px;}
  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:10px 18px; border-radius:999px;
    font-size:14px; font-weight:600; text-decoration:none;
    border:1.5px solid transparent; cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-line{background:#06C755; color:#fff;}
  .btn-line:hover{opacity:.92;}
  .btn-call{background:transparent; border-color:rgba(255,255,255,.55); color:#fff;}
  .btn-call:hover{background:rgba(255,255,255,.1);}

  /* ---------- Tabs ---------- */
  .tabbar-wrap{
    position:sticky; top:0; z-index:30;
    background:rgba(250,246,238,.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .tabbar{
    max-width:980px; margin:0 auto;
    display:flex; gap:4px; overflow-x:auto;
    padding:10px 14px; scrollbar-width:none;
  }
  .tabbar::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex:none;
    display:flex; align-items:center; gap:6px;
    padding:9px 14px; border-radius:10px;
    font-size:13.5px; font-weight:600; color:var(--muted);
    background:transparent; border:1px solid transparent;
    cursor:pointer; white-space:nowrap;
    font-family:'Noto Sans TC', sans-serif;
    transition:all .15s ease;
  }
  .tab-btn svg{width:16px; height:16px; flex:none;}
  .tab-btn:hover{background:#F0EADC;}
  .tab-btn.active{
    background:var(--navy); color:#fff; border-color:var(--navy);
    box-shadow:var(--shadow);
  }

  /* ---------- Main ---------- */
  main{max-width:980px; margin:0 auto; padding:22px 16px 10px;}
  .panel{display:none; animation:fadeIn .25s ease;}
  .panel.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  .panel-head{margin-bottom:16px;}
  .panel-head h2{font-size:21px; margin:0 0 4px; color:var(--navy); font-weight:700;}
  .panel-head p{margin:0; font-size:13px; color:var(--muted);}

  .card{
    background:var(--paper); border:1px solid var(--line);
    border-radius:var(--radius); padding:20px;
    margin-bottom:16px; box-shadow:var(--shadow);
  }
  .card-title{
    display:flex; align-items:center; gap:8px;
    font-size:14.5px; font-weight:700; color:var(--navy);
    margin-bottom:14px;
  }
  .tag{
    font-size:11px; font-weight:600; padding:2px 9px; border-radius:999px;
    background:#F0E6C9; color:#8A6A1F;
  }
  .tag.blue{background:#E4ECF6; color:var(--navy-2);}

  .field-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:560px){.field-grid{grid-template-columns:1fr;}}
  .field label{
    display:flex; align-items:baseline; gap:6px;
    font-size:13px; font-weight:600; color:var(--ink); margin-bottom:6px;
  }
  .field label .unit{font-weight:400; color:var(--muted); font-size:11.5px;}
  .field input[type=text], .field input[type=number], .field select{
    width:100%; padding:11px 12px; border-radius:9px;
    border:1.5px solid var(--line); font-size:14px;
    font-family:'Noto Sans TC', sans-serif;
    background:#FCFAF5; color:var(--ink);
    transition:border-color .15s ease;
  }
  .field input:focus, .field select:focus{
    outline:none; border-color:var(--gold); background:#fff;
  }
  .date-row{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}

  .seg{
    display:flex; border-radius:10px; overflow:hidden;
    border:1.5px solid var(--line);
  }
  .seg button{
    flex:1; padding:10px 8px; font-size:12.5px; font-weight:600;
    border:none; background:#FCFAF5; color:var(--muted); cursor:pointer;
    font-family:'Noto Sans TC', sans-serif;
    border-right:1px solid var(--line);
    transition:all .15s ease;
  }
  .seg button:last-child{border-right:none;}
  .seg button.active{background:var(--gold); color:#fff;}

  .toggle-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border:1.5px dashed var(--gold-2);
    border-radius:10px; background:#FBF6E9; margin-top:4px;
  }
  .toggle-row .t-label{font-size:13px; font-weight:600;}
  .toggle-row .t-sub{font-size:11.5px; color:var(--muted); margin-top:2px;}
  .switch{position:relative; width:42px; height:24px; flex:none;}
  .switch input{opacity:0; width:0; height:0;}
  .slider{
    position:absolute; cursor:pointer; inset:0; background:#D8D2C2;
    border-radius:999px; transition:.2s;
  }
  .slider::before{
    content:""; position:absolute; width:18px; height:18px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.2s;
  }
  input:checked + .slider{background:var(--gold);}
  input:checked + .slider::before{transform:translateX(18px);}

  .hint{font-size:12px; color:var(--muted); background:#F5F1E7; padding:9px 12px; border-radius:8px; margin-top:10px;}

  .result-box{
    background:linear-gradient(135deg, #FBF3DF, #F3E4BE);
    border:1px solid #E7CE93; border-radius:var(--radius);
    padding:20px; margin-bottom:14px;
  }
  .result-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:560px){.result-grid{grid-template-columns:1fr;}}
  .result-item{background:rgba(255,255,255,.55); border-radius:10px; padding:14px;}
  .result-item .rl{font-size:12px; color:#6B5A2E; font-weight:600; margin-bottom:4px;}
  .result-item .rv{font-size:20px; font-weight:700; color:var(--navy); font-family:'Noto Serif TC',serif;}

  .result-hero{
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
    border-radius:12px; padding:18px 20px; color:#fff; margin-bottom:12px;
  }
  .result-hero .rl{font-size:13px; font-weight:600; opacity:.9;}
  .result-hero .rv{font-size:32px; font-weight:900; font-family:'Noto Serif TC',serif; margin-top:2px;}

  .breakdown{background:#fff; border-radius:10px; overflow:hidden;}
  .breakdown-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 14px; font-size:13px; border-bottom:1px solid #F1E9D4;
  }
  .breakdown-row:last-child{border-bottom:none;}
  .breakdown-row.total{font-weight:700; background:#FBF6E9;}
  .breakdown-row .v{font-weight:600; color:var(--danger);}
  .breakdown-row .v.pos{color:var(--success);}

  .reverse-box{
    background:var(--navy); color:#fff; border-radius:var(--radius); padding:18px 20px;
  }
  .reverse-box .rt{font-size:13.5px; font-weight:700; margin-bottom:2px;}
  .reverse-box .rs{font-size:12px; color:#B9C6D9; margin-bottom:12px;}
  .reverse-box input{
    width:100%; padding:11px 12px; border-radius:9px; border:none;
    font-size:14px; margin-bottom:10px; font-family:'Noto Sans TC', sans-serif;
  }
  .reverse-out{font-size:13px; color:#E8EDF4; line-height:1.9;}
  .reverse-out b{color:var(--gold-2); font-size:16px;}

  .disclaimer{
    text-align:center; font-size:11.5px; color:var(--muted); padding:24px 16px 8px;
  }

  .float-actions{
    position:fixed; left:0; right:0; bottom:0; z-index:40;
    display:flex; gap:1px; background:var(--line);
  }
  .float-actions a{
    flex:1; text-align:center; padding:14px 10px; font-size:14px; font-weight:700;
    text-decoration:none; display:flex; align-items:center; justify-content:center; gap:7px;
  }
  .float-actions .fa-line{background:#06C755; color:#fff;}
  .float-actions .fa-call{background:var(--navy); color:#fff;}

  .converter-formula{
    background:#FBF6E9; border:1px solid #E7CE93; border-radius:10px;
    padding:14px; text-align:center; font-size:13px; color:#6B5A2E; margin-bottom:16px;
    line-height:1.8;
  }
</style>
</head>

/* ============ helpers ============ */
function fmt(n, digits=1){
  if(n===null || n===undefined || isNaN(n)) return '—';
  const r = Math.round(n*Math.pow(10,digits))/Math.pow(10,digits);
  return r.toLocaleString('zh-TW', {maximumFractionDigits:digits, minimumFractionDigits:0});
}
function num(el){ const v = parseFloat(el.value); return isNaN(v) ? 0 : v; }
function $(sel, ctx=document){ return ctx.querySelector(sel); }
function $all(sel, ctx=document){ return Array.from(ctx.querySelectorAll(sel)); }

/* segmented control helper */
function initSeg(container, onChange){
  const btns = $all('button', container);
  btns.forEach(b=>{
    b.addEventListener('click', ()=>{
      btns.forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      onChange(b.dataset.value, b);
    });
  });
}

/* ROC date select builder */
function buildYearOptions(select, startROC, endROC, defaultROC){
  select.innerHTML = '';
  for(let y=endROC; y>=startROC; y--){
    const o = document.createElement('option');
    o.value = y; o.textContent = y+' 年';
    if(y===defaultROC) o.selected = true;
    select.appendChild(o);
  }
}
function buildSimpleOptions(select, count, unit, def){
  select.innerHTML='';
  for(let i=1;i<=count;i++){
    const o = document.createElement('option');
    o.value=i; o.textContent=i+' '+unit;
    if(i===def) o.selected=true;
    select.appendChild(o);
  }
}
function rocToDate(y,m,d){ return new Date(parseInt(y)+1911, parseInt(m)-1, parseInt(d)); }
function yearsBetween(d1,d2){ return (d2-d1)/(1000*60*60*24*365.25); }
function tierFromYears(y){
  if(y<2) return {rate:0.45, label:'2 年內（45%）'};
  if(y<5) return {rate:0.35, label:'2–5 年（35%）'};
  if(y<10) return {rate:0.20, label:'5–10 年（20%）'};
  return {rate:0.15, label:'10 年以上（15%）'};
}

TABS.forEach((t,i)=>{

  b.innerHTML = ICONS[t.icon] + '<span>'+t.label+'</span>';
  b.addEventListener('click', ()=> showTab(t.id));
  tabbar.appendChild(b);

function showTab(id){
  $all('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab===id));
  $all('.panel').forEach(p=> p.classList.toggle('active', p.id==='panel-'+id));

      <div class="field"><label>寬限期 <span class="unit">年</span></label><input type="number" id="mg-grace" value="0"></div>
    </div>
  </div>
  <div class="result-box">
    <div class="result-hero"><div class="rl">每月應繳（本息攤還）</div><div class="rv" id="mg-monthly">$—</div></div>
    <div class="breakdown">
      <div class="breakdown-row"><span>寬限期內每月（只繳利息）</span><span class="v pos" id="mg-grace-pay">$—</span></div>
      <div class="breakdown-row"><span>總利息支出</span><span class="v" id="mg-interest">$—</span></div>
      <div class="breakdown-row total"><span>總還款金額</span><span class="v" id="mg-total">$—</span></div>
    </div>
  </div>
</section>
`);

(function(){
  const amt=$('#mg-amt'), rate=$('#mg-rate'), years=$('#mg-years'), grace=$('#mg-grace');
  function calc(){
    const P=num(amt), annual=num(rate), yrs=num(years), g=num(grace);
    if(P<=0 || annual<0 || yrs<=0){ 
      $('#mg-monthly').textContent='$—'; $('#mg-grace-pay').textContent='$—';
      $('#mg-interest').textContent='$—'; $('#mg-total').textContent='$—';
      return;
    }
    const r = annual/100/12;
    const nTotal = yrs*12, nGrace = Math.min(g*12, nTotal), nRepay = nTotal-nGrace;
    const gracePay = P*r;
    let repayPay = 0;
    if(nRepay>0){
      repayPay = r===0 ? P/nRepay : P*r*Math.pow(1+r,nRepay)/(Math.pow(1+r,nRepay)-1);
    }
    const totalPaid = gracePay*nGrace + repayPay*nRepay;
    const totalInterest = totalPaid - P;
    $('#mg-monthly').textContent = '$'+fmt(repayPay,2)+' 萬';
    $('#mg-grace-pay').textContent = nGrace>0 ? '$'+fmt(gracePay,2)+' 萬' : '不適用';
    $('#mg-interest').textContent = '$'+fmt(totalInterest,2)+' 萬';
    $('#mg-total').textContent = '$'+fmt(totalPaid,2)+' 萬';
  }
  [amt,rate,years,grace].forEach(el=>el.addEventListener('input', calc));
  calc();
})();

    <div class="hint">輸入後自動顯示「房屋價格 / 房屋坪數」</div>
  </div>

  <div class="result-box">
    <div class="result-grid" style="margin-bottom:12px;">
      <div class="result-item"><div class="rl">房屋單價（談價用）</div><div class="rv" id="np-unitprice">— 萬/坪</div></div>
      <div class="result-item"><div class="rl">房地合一稅</div><div class="rv" id="np-housetax">— 萬</div></div>
    </div>
    <div class="result-hero"><div class="rl">屋主實拿（扣全部費用＋稅＋貸款）</div><div class="rv" id="np-net">— 萬</div></div>
    <div class="breakdown" id="np-breakdown"></div>
  </div>

  <div class="reverse-box">
    <div class="rt">🔄 反推賣拿：屋主說「我要拿 ___ 萬」</div>
    <div class="rs">輸入屋主想賣拿的金額，系統反推總價與單價應該掛多少（其他欄位需先填好）</div>
    <input type="number" id="np-reverse" placeholder="例如：屋主想拿 600 萬">
    <div class="reverse-out" id="np-reverse-out">請先輸入上方基礎資訊，再輸入屋主想拿的金額</div>
  </div>
</section>
`);

(function(){
  // populate date selects
  const nowROC = new Date().getFullYear()-1911;
  buildYearOptions($('#np-py'), nowROC-40, nowROC, nowROC-5);
  buildSimpleOptions($('#np-pm'), 12, '月', 1);
  buildSimpleOptions($('#np-pd'), 31, '日', 1);
  buildYearOptions($('#np-cy'), nowROC-5, nowROC+3, nowROC);
  buildSimpleOptions($('#np-cm'), 12, '月', new Date().getMonth()+1);
  buildSimpleOptions($('#np-cd'), 31, '日', new Date().getDate());

  const totalPing=$('#np-totalping'), pPing=$('#np-pping'), pPrice=$('#np-pprice');
  const acqPrice=$('#np-acqprice'), acqFee=$('#np-acqfee');
  const py=$('#np-py'), pm=$('#np-pm'), pd=$('#np-pd'), cy=$('#np-cy'), cm=$('#np-cm'), cd=$('#np-cd');
  const selfuse=$('#np-selfuse');
  const landtaxM=$('#np-landtax'), loanM=$('#np-loan');
  const feeManual=$('#np-feemanual'), feeManualWrap=$('#np-feemanual-wrap');
  const deductManual=$('#np-deductmanual'), deductManualWrap=$('#np-deductmanual-wrap');
  const askTotal=$('#np-asktotal'), askUnit=$('#np-askunit');
  const reverseInput=$('#np-reverse');

  let feeMode='default', deductMode='same';
  initSeg($('#np-feemode'), v=>{ feeMode=v; feeManualWrap.style.display = v==='manual'?'block':'none'; syncFromTotal(); });
  initSeg($('#np-deductmode'), v=>{
    deductMode=v; deductManualWrap.style.display = v==='manual'?'block':'none';
    $('#np-deducthint').textContent = v==='same' ? '可認列移轉費用 = 同服務費金額'
      : v==='cap' ? '可認列移轉費用 = 成交價 3%，上限 30 萬' : '手動輸入可認列移轉費用';
    syncFromTotal();
  });

  let lockPrice=false;
  askTotal.addEventListener('input', ()=>{
    if(lockPrice) return; lockPrice=true;
    const exPing = num(totalPing)-num(pPing);
    if(exPing>0 && askTotal.value!==''){
      const priceEx = num(askTotal)-num(pPrice);
      askUnit.value = fmt(priceEx/exPing,2);
    }
    lockPrice=false;
    calcAll();
  });
  askUnit.addEventListener('input', ()=>{
    if(lockPrice) return; lockPrice=true;
    const exPing = num(totalPing)-num(pPing);
    if(exPing>0 && askUnit.value!==''){
      const totalCalc = num(askUnit)*exPing + num(pPrice);
      askTotal.value = fmt(totalCalc,2);
    }
    lockPrice=false;
    calcAll();
  });
  function syncFromTotal(){ calcAll(); }

  function holdingTier(){
    const d1 = rocToDate(py.value, pm.value, pd.value);
    const d2 = rocToDate(cy.value, cm.value, cd.value);
    const y = yearsBetween(d1,d2);
    if(isNaN(y) || y<0) return null;
    return {years:y, ...tierFromYears(y)};
  }

  function serviceFeeOf(P){
    return feeMode==='default' ? P*0.04 : num(feeManual);
  }
  function deductibleFeeOf(P, svcFee){
    if(deductMode==='same') return svcFee;
    if(deductMode==='cap') return Math.min(P*0.03, 30);
    return num(deductManual);
  }

  // forward calc: given asking total price P, compute all outputs
  function forward(P){
    const svcFee = serviceFeeOf(P);
    const deductFee = deductibleFeeOf(P, svcFee);
    const base = P - num(acqPrice) - num(acqFee) - deductFee;
    const tier = holdingTier();
    let houseTax = 0, rateLabel='—';
    if(tier){
      if(selfuse.checked){
        houseTax = Math.max(0, base-400)*0.10;
        rateLabel = '自用優惠';
      } else {
        houseTax = Math.max(0, base)*tier.rate;
        rateLabel = tier.label;
      }
    }
    const secretarial = 0.10;
    const registration = 0.20;
    const escrow = P*0.0003;
    const cancelFee = 0.60;
    const landtax = num(landtaxM);
    const loan = num(loanM);
    const totalDeduction = secretarial+registration+escrow+svcFee+cancelFee+landtax+houseTax+loan;
    const net = P - totalDeduction;
    return {svcFee, deductFee, base, houseTax, rateLabel, secretarial, registration, escrow, cancelFee, landtax, loan, totalDeduction, net, tier};
  }

  function calcAll(){
    const P = num(askTotal);
    $('#np-holdinghint').textContent = holdingTier()
      ? `持有期間約 ${fmt(holdingTier().years,1)} 年 → 適用稅率：${holdingTier().label}`
      : '請填寫兩個日期 → 自動判定持有期間與稅率';

    const exPing = num(totalPing)-num(pPing);
    $('#np-unitprice').textContent = (exPing>0 && P>0) ? fmt((P-num(pPrice))/exPing,2)+' 萬/坪' : '— 萬/坪';

    if(P<=0){
      $('#np-housetax').textContent='— 萬';
      $('#np-net').textContent='— 萬';
      $('#np-breakdown').innerHTML='';
      return;
    }
    const r = forward(P);
    $('#np-housetax').textContent = fmt(r.houseTax,2)+' 萬';
    $('#np-net').textContent = fmt(r.net,2)+' 萬';
    $('#np-breakdown').innerHTML = `
      <div class="breakdown-row"><span>代書費（潤筆）</span><span class="v">${fmt(r.secretarial,2)} 萬</span></div>
      <div class="breakdown-row"><span>實價登錄費</span><span class="v">${fmt(r.registration,2)} 萬</span></div>
      <div class="breakdown-row"><span>履保費（成交價 × 萬分之三）</span><span class="v">${fmt(r.escrow,2)} 萬</span></div>
      <div class="breakdown-row"><span>服務費（成交價 × 4%）</span><span class="v">${fmt(r.svcFee,2)} 萬</span></div>
      <div class="breakdown-row"><span>塗銷費＋稅籍資料</span><span class="v">${fmt(r.cancelFee,2)} 萬</span></div>
      <div class="breakdown-row"><span>土增稅</span><span class="v">${fmt(r.landtax,2)} 萬</span></div>
      <div class="breakdown-row"><span>房地合一稅（${r.rateLabel}）</span><span class="v">${fmt(r.houseTax,2)} 萬</span></div>
      <div class="breakdown-row"><span>剩餘貸款</span><span class="v">${fmt(r.loan,2)} 萬</span></div>
      <div class="breakdown-row total"><span>合計扣除</span><span class="v">${fmt(r.totalDeduction,2)} 萬</span></div>
    `;
    reverseCalc();
  }

  function reverseCalc(){
    const target = num(reverseInput);
    if(!target || target<=0){
      $('#np-reverse-out').innerHTML = '請先輸入上方基礎資訊，再輸入屋主想拿的金額';
      return;
    }
    // binary search P such that forward(P).net == target
    let lo=0, hi=200000, mid, r;
    for(let i=0;i<60;i++){
      mid=(lo+hi)/2;
      r=forward(mid);
      if(r.net < target) lo=mid; else hi=mid;
    }
    const P = mid;
    const exPing = num(totalPing)-num(pPing);
    const unit = exPing>0 ? (P-num(pPrice))/exPing : null;
    $('#np-reverse-out').innerHTML = `建議掛總價約 <b>${fmt(P,1)} 萬</b>　|　單價約 <b>${unit!==null?fmt(unit,2):'—'} 萬/坪</b><br>（此金額已扣除服務費、房地合一稅、土增稅、貸款等全部費用）`;
  }

  [totalPing,pPing,pPrice,acqPrice,acqFee,landtaxM,loanM,feeManual,deductManual].forEach(el=>{
    el.addEventListener('input', calcAll);
  });
  [py,pm,pd,cy,cm,cd].forEach(el=> el.addEventListener('change', calcAll));
  selfuse.addEventListener('change', calcAll);
  reverseInput.addEventListener('input', reverseCalc);

  calcAll();
})();
</script>
</body>
</html>
